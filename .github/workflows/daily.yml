name: Daily Video Run

on:
  schedule:
    - cron: "0 14 * * *"   # 14:00 UTC daily — 9 AM ET / 2 PM UTC
  workflow_dispatch:        # allow manual triggers

permissions:
  contents: write           # needed for git push back

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Use a PAT so the push triggers subsequent workflows if needed
          token: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg libavcodec-extra
          # Install Inter Bold font for ASS subtitle rendering
          sudo mkdir -p /usr/local/share/fonts
          sudo cp assets/fonts/Inter-Bold.otf /usr/local/share/fonts/
          sudo fc-cache -fv

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache faster-whisper model
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: whisper-small-en-int8-v1

      - name: Install Python dependencies
        run: pip install --upgrade pip && pip install -r requirements.txt

      - name: Configure git identity
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Run daily pipeline
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:     ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY:         ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_ID:      ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:  ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:  ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          IG_USER_ID:             ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN:        ${{ secrets.IG_ACCESS_TOKEN }}
          FB_APP_ID:              ${{ secrets.FB_APP_ID }}
          FB_APP_SECRET:          ${{ secrets.FB_APP_SECRET }}
          R2_ACCOUNT_ID:          ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY:          ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY:          ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET:              ${{ secrets.R2_BUCKET }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          # PAT required for gh secret set (token rotation). Falls back to GITHUB_TOKEN
          # which will skip rotation with a warning rather than failing.
          GH_TOKEN: ${{ secrets.GH_PAT || secrets.GITHUB_TOKEN }}
        run: python -m src.main

      - name: Upload video artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: final-video-${{ github.run_id }}
          path: runs/*/final.mp4
          retention-days: 7
          if-no-files-found: warn
